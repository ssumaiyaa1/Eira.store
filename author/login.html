<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – Eira Store</title>
    <link rel="stylesheet" href="../web.css">
</head>
<body>

    <header>
        <div id="navbar">
            <div class="logo-title">
                <img id="logo" src="../image/logo1.jpg" alt="Eira Store Logo">
                <span id="sitename">Eira Store</span>
            </div>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="author/login.html" class="active">Login</a></li>
                    <li><a href="author/signup.html">Sign Up</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="card">
            <h2>Welcome Back!</h2>
            <p class="subtitle">Login to your Eira Store account</p>

            <div class="msg" id="msg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="submit-btn">Login</button>
            </form>

            <div class="divider">or</div>

            <p class="auth-link">Don't have an account? <a href="signup.html">Sign up here</a></p>
        </div>
    </main>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const msg = document.getElementById("msg");

            let formData = new FormData();
            formData.append("email", email);
            formData.append("password", password);

            fetch("login.php", {
                method: "POST",
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    msg.className = "msg success";
                    msg.style.display = "block";
                    msg.textContent = "Login successful! Redirecting...";
                    setTimeout(() => window.location.href = "index.html", 1500);
                } else {
                    msg.className = "msg error";
                    msg.style.display = "block";
                    msg.textContent = data.message || "Invalid email or password.";
                }
            })
            .catch(() => {
                msg.className = "msg error";
                msg.style.display = "block";
                msg.textContent = "Something went wrong. Please try again.";
            });
        });
    </script>

</body>
</html>
