<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up – Eira Store</title>
    <link rel="stylesheet" href="../web.css">
</head>
<body>

    <header>
        <div id="navbar">
            <div class="logo-title">
                <img id="logo" src="../image/logo1.jpg" alt="Eira Store Logo">
                <span id="sitename">Eira Store</span>
            </div>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="author/login.html">Login</a></li>
                    <li><a href="author/signup.html" class="active">Sign Up</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="card">
            <h2>Create Account</h2>
            <p class="subtitle">Join Eira Store and start shopping!</p>

            <div class="msg" id="msg"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
                </div>

                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <div class="divider">or</div>

            <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </main>

    <script>
        document.getElementById("signupForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirmPassword").value;
            const msg = document.getElementById("msg");

            if (password !== confirm) {
                msg.className = "msg error";
                msg.style.display = "block";
                msg.textContent = "Passwords do not match!";
                return;
            }

            if (password.length < 6) {
                msg.className = "msg error";
                msg.style.display = "block";
                msg.textContent = "Password must be at least 6 characters.";
                return;
            }

            let formData = new FormData();
            formData.append("name", name);
            formData.append("email", email);
            formData.append("password", password);

            fetch("save.php", {
                method: "POST",
                body: formData
            })
            .then(res => res.text())
            .then(() => {
                msg.className = "msg success";
                msg.style.display = "block";
                msg.textContent = "Account created! Redirecting to login...";
                setTimeout(() => window.location.href = "login.html", 2000);
            })
            .catch(() => {
                msg.className = "msg error";
                msg.style.display = "block";
                msg.textContent = "Something went wrong. Please try again.";
            });
        });
    </script>

</body>
</html>
